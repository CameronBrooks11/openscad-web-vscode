name: Feature request
description: Suggest a new capability or an improvement to the extension.
title: '[Feature]: '
labels: ['enhancement']
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement. Please describe the problem you are
        trying to solve, not just the solution — it helps us find the best fit.

        Note: live `.scad` preview is already tracked by epic
        [#8](https://github.com/CameronBrooks11/openscad-web-vscode/issues/8).
  - type: checkboxes
    id: preflight
    attributes:
      label: Preflight checklist
      options:
        - label: I searched existing issues and did not find a duplicate.
          required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What are you trying to do, and what makes it hard or impossible today?
      placeholder: I'm always frustrated when ...
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What would you like to see happen?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches or workarounds you have tried or thought about.
  - type: textarea
    id: extra
    attributes:
      label: Additional context
      description: Mockups, links to relevant OpenSCAD features, or other context.
