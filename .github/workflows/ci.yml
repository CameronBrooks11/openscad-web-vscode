name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Format check
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Compile
        run: npm run compile

      - name: Unit tests
        run: npm run test:unit

      - name: Verify vendored viewer artifact
        run: npm run verify-viewer

      - name: Extension smoke test (headless)
        run: xvfb-run -a npm test
